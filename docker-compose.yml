version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collabcanvas-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_db_password_here
      POSTGRES_DB: live_collab_workspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d live_collab_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: collabcanvas-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: collabcanvas-server
    restart: always
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:8080
      DATABASE_URL: postgresql://postgres:secure_db_password_here@postgres:5432/live_collab_workspace?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretproductionjwtkey123
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000
    container_name: collabcanvas-client
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
